apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcplane
  labels:
    app: gcplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gcplane
  template:
    metadata:
      labels:
        app: gcplane
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8480"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: gcplane
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: gcplane
          image: ghcr.io/dataplanelabs/gcplane:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - serve
            - -f
            - /config/manifest.yaml
            - --interval
            - "30s"
          ports:
            - name: http
              containerPort: 8480
              protocol: TCP
          envFrom:
            - secretRef:
                name: gcplane-secrets
          env:
            - name: GCPLANE_LOG_FORMAT
              value: "json"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: gcplane-manifest
