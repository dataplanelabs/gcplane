name: E2E
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOCLAW_VERSION: "0.4.4"

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: goclaw
          POSTGRES_PASSWORD: goclaw
          POSTGRES_DB: goclaw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build gcplane
        run: go build -o gcplane .

      - name: Start GoClaw ${{ env.GOCLAW_VERSION }}
        run: |
          docker run -d --name goclaw \
            --network host \
            -e GOCLAW_HOST=0.0.0.0 \
            -e GOCLAW_PORT=18790 \
            -e GOCLAW_GATEWAY_TOKEN=test-token-ci \
            -e GOCLAW_ENCRYPTION_KEY=$(openssl rand -hex 32) \
            -e GOCLAW_POSTGRES_DSN=postgres://goclaw:goclaw@localhost:5432/goclaw?sslmode=disable \
            ghcr.io/nextlevelbuilder/goclaw:${{ env.GOCLAW_VERSION }}

          for i in $(seq 1 30); do
            if curl -sf http://localhost:18790/health > /dev/null 2>&1; then
              echo "GoClaw ${{ env.GOCLAW_VERSION }} ready"
              break
            fi
            sleep 2
          done

      - name: Test validate
        run: ./gcplane validate -f examples/minimal.yaml

      - name: Test plan
        run: ./gcplane plan -f examples/minimal.yaml --endpoint http://localhost:18790 --token test-token-ci

      - name: Test apply + idempotency
        run: |
          ./gcplane apply -f examples/minimal.yaml --endpoint http://localhost:18790 --token test-token-ci --auto-approve
          ./gcplane plan -f examples/minimal.yaml --endpoint http://localhost:18790 --token test-token-ci | grep -q "0 to create, 0 to update"

      - name: Test diff
        run: ./gcplane diff -f examples/minimal.yaml --endpoint http://localhost:18790 --token test-token-ci

      - name: Test export
        run: ./gcplane export --endpoint http://localhost:18790 --token test-token-ci

      - name: Test destroy --dry-run
        run: ./gcplane destroy --endpoint http://localhost:18790 --token test-token-ci --dry-run

      - name: Cleanup
        if: always()
        run: docker rm -f goclaw 2>/dev/null || true
