services:
  gcplane:
    build:
      context: .
      args:
        VERSION: dev
    command:
      - serve
      - -f
      - /config/manifest.yaml
      - --interval
      - "10s"
    ports:
      - "8480:8480"
    volumes:
      - ./examples/local-dev.yaml:/config/manifest.yaml:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8480/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
