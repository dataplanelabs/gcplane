apiVersion: gcplane.io/v1
kind: Manifest
metadata:
  name: acme-corp-dev
  environment: dev

connection:
  endpoint: http://acme-goclaw-dev:18790
  token: ${ACME_DEV_GOCLAW_TOKEN}

resources:
  # --- LLM Providers ---
  - kind: Provider
    name: anthropic
    spec:
      displayName: "Anthropic"
      providerType: anthropic_native
      apiBase: https://api.anthropic.com
      apiKey: ${ANTHROPIC_API_KEY}
      enabled: true

  # --- Engineering agents ---
  - kind: Agent
    name: code-assistant
    spec:
      displayName: "Code Assistant"
      provider: anthropic
      model: claude-sonnet-4-20250514
      agentType: open
      status: active
      isDefault: true
      toolsConfig:
        profile: coding

  # --- Support agents ---
  - kind: Agent
    name: support-bot
    spec:
      displayName: "Support Bot"
      provider: anthropic
      model: claude-sonnet-4-20250514
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are the Acme Corp support assistant.
            Be helpful, concise, and professional.
