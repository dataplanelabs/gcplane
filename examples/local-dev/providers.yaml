resources:
  - kind: Provider
    name: zai-coding
    spec:
      displayName: "Z.ai Coding Plan"
      providerType: zai_coding
      apiBase: https://api.z.ai/api/coding/paas/v4
      apiKey: ${GOCLAW_ZAI_CODING_API_KEY}
      enabled: true

  - kind: Provider
    name: openrouter
    spec:
      displayName: "OpenRouter"
      providerType: openrouter
      apiBase: https://openrouter.ai/api/v1
      apiKey: ${GOCLAW_OPENROUTER_API_KEY}
      enabled: true

  - kind: Provider
    name: anthropic
    spec:
      displayName: "Anthropic (Proxy)"
      providerType: openai_compat
      apiBase: ${GOCLAW_ANTHROPIC_BASE_URL}
      apiKey: ${GOCLAW_ANTHROPIC_API_KEY}
      enabled: true

  - kind: Provider
    name: gemini
    spec:
      displayName: "Google Gemini"
      providerType: gemini_native
      apiKey: ${GOCLAW_GEMINI_API_KEY}
      enabled: true
