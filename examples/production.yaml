apiVersion: gcplane.io/v1
kind: Manifest
metadata:
  name: production
  environment: prod

connection:
  endpoint: https://goclaw.example.com
  token: ${GCPLANE_TOKEN}

resources:
  # ============================================================
  # LLM Providers
  # ============================================================
  - kind: Provider
    name: anthropic
    spec:
      displayName: "Anthropic"
      providerType: anthropic_native
      apiBase: https://api.anthropic.com
      apiKey: ${ANTHROPIC_API_KEY}
      enabled: true

  - kind: Provider
    name: openai
    spec:
      displayName: "OpenAI"
      providerType: openai_compat
      apiBase: https://api.openai.com/v1
      apiKey: ${OPENAI_API_KEY}
      enabled: true

  # ============================================================
  # Agents
  # ============================================================
  - kind: Agent
    name: support-bot
    spec:
      displayName: "Support Bot"
      provider: anthropic
      model: claude-sonnet-4-20250514
      agentType: predefined
      status: active
      toolsConfig:
        profile: coding
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a support bot for our platform.
            Be helpful, concise, and professional.

  - kind: Agent
    name: data-analyst
    spec:
      displayName: "Data Analyst"
      provider: openai
      model: gpt-4o
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal

  # ============================================================
  # Channels
  # ============================================================
  - kind: Channel
    name: telegram-support
    spec:
      channelType: telegram
      agentKey: support-bot
      botToken: ${TELEGRAM_BOT_TOKEN}
      config:
        dmPolicy: allow

  - kind: Channel
    name: discord-community
    spec:
      channelType: discord
      agentKey: support-bot
      botToken: ${DISCORD_BOT_TOKEN}

  # ============================================================
  # Cron Jobs
  # ============================================================
  - kind: CronJob
    name: daily-report
    spec:
      schedule:
        kind: cron
        expr: "0 9 * * *"
        tz: Asia/Saigon
      message: "Generate daily status report and send to #reports channel"
      agentKey: support-bot
      enabled: true

  - kind: CronJob
    name: weekly-digest
    spec:
      schedule:
        kind: cron
        expr: "0 10 * * 1"
        tz: Asia/Saigon
      message: "Create weekly digest of all support conversations"
      agentKey: support-bot
      enabled: true

  # ============================================================
  # MCP Servers
  # ============================================================
  - kind: MCPServer
    name: github-mcp
    spec:
      transport: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-github"]
      env:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
      grants:
        agents: [support-bot, data-analyst]

  # ============================================================
  # TTS Config
  # ============================================================
  - kind: TTSConfig
    name: global
    spec:
      mode: "off"
      provider: edge
      voice: en-US-AriaNeural

  # ============================================================
  # Teams
  # ============================================================
  - kind: Team
    name: platform-team
    spec:
      displayName: "Platform Team"
