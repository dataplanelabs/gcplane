apiVersion: gcplane.io/v1
kind: Manifest
metadata:
  name: local-dev
  environment: dev

connection:
  endpoint: http://localhost:18790
  token: ${GOCLAW_TOKEN}

resources:
  # ============================================================
  # LLM Providers
  # ============================================================
  - kind: Provider
    name: zai-coding
    spec:
      displayName: "Z.ai Coding Plan"
      providerType: zai_coding
      apiBase: https://api.z.ai/api/coding/paas/v4
      apiKey: ${GOCLAW_ZAI_CODING_API_KEY}
      enabled: true

  - kind: Provider
    name: openrouter
    spec:
      displayName: "OpenRouter"
      providerType: openrouter
      apiBase: https://openrouter.ai/api/v1
      apiKey: ${GOCLAW_OPENROUTER_API_KEY}
      enabled: true

  - kind: Provider
    name: anthropic
    spec:
      displayName: "Anthropic (Proxy)"
      providerType: openai_compat
      apiBase: ${GOCLAW_ANTHROPIC_BASE_URL}
      apiKey: ${GOCLAW_ANTHROPIC_API_KEY}
      enabled: true

  - kind: Provider
    name: gemini
    spec:
      displayName: "Google Gemini"
      providerType: gemini_native
      apiKey: ${GOCLAW_GEMINI_API_KEY}
      enabled: true

  # ============================================================
  # Agents — Data Team
  # ============================================================
  - kind: Agent
    name: assistant
    spec:
      displayName: "Assistant"
      provider: zai-coding
      model: glm-5
      agentType: open
      status: active
      isDefault: true
      toolsConfig:
        profile: coding

  - kind: Agent
    name: data-engineer
    spec:
      displayName: "Data Engineer"
      provider: zai-coding
      model: glm-5
      agentType: predefined
      status: active
      toolsConfig:
        profile: coding
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a data engineer. You build data pipelines,
            ETL processes, and manage data infrastructure.
            Focus on reliability, scalability, and data quality.

  - kind: Agent
    name: data-analyst
    spec:
      displayName: "Data Analyst"
      provider: openrouter
      model: google/gemini-2.5-flash-preview
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a data analyst. You analyze datasets,
            create visualizations, and produce insights.
            Use SQL, Python, and statistical methods.

  - kind: Agent
    name: report-builder
    spec:
      displayName: "Report Builder"
      provider: zai-coding
      model: glm-5
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a report builder. You create executive summaries,
            dashboards, and data reports. Make data actionable
            and easy to understand for stakeholders.

  # ============================================================
  # Agents — Product Team
  # ============================================================
  - kind: Agent
    name: market-researcher
    spec:
      displayName: "Market Researcher"
      provider: openrouter
      model: google/gemini-2.5-flash-preview
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a market researcher. You analyze competitors,
            identify trends, and evaluate market opportunities.
            Provide data-driven recommendations.

  - kind: Agent
    name: product-planner
    spec:
      displayName: "Product Planner"
      provider: zai-coding
      model: glm-5
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a product planner. You write PRDs,
            prioritize features, and create roadmaps.
            Balance user needs with technical feasibility.

  - kind: Agent
    name: dev-lead
    spec:
      displayName: "Dev Lead"
      provider: zai-coding
      model: glm-5
      agentType: predefined
      status: active
      toolsConfig:
        profile: coding
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a dev lead. You review architecture decisions,
            mentor engineers, and coordinate implementation.
            Focus on code quality and team velocity.

  # ============================================================
  # Channels
  # ============================================================
  - kind: Channel
    name: telegram-main
    spec:
      channelType: telegram
      agentKey: assistant
      botToken: ${GOCLAW_TELEGRAM_TOKEN}

  - kind: Channel
    name: slack-main
    spec:
      channelType: slack
      agentKey: assistant
      botToken: ${GOCLAW_SLACK_BOT_TOKEN}
      config:
        appToken: ${GOCLAW_SLACK_APP_TOKEN}

  # ============================================================
  # MCP Servers
  # ============================================================
  - kind: MCPServer
    name: huly-mcp
    spec:
      displayName: "Huly Project Management"
      transport: sse
      url: https://mcp.dataplanelabs.com/huly/mcp
      enabled: true
      grants:
        agents: [assistant, product-planner, dev-lead]

  - kind: MCPServer
    name: k8s-mcp
    spec:
      displayName: "Kubernetes Monitoring"
      transport: sse
      url: https://mcp.dataplanelabs.com/k8s/mcp
      enabled: true
      grants:
        agents: [assistant, data-engineer]

  - kind: MCPServer
    name: gws-mcp
    spec:
      displayName: "Google Workspace"
      transport: sse
      url: https://mcp.dataplanelabs.com/gws/mcp
      enabled: true
      grants:
        agents: [assistant, report-builder, product-planner]

  # ============================================================
  # Cron Jobs
  # ============================================================
  - kind: CronJob
    name: daily-standup
    spec:
      schedule:
        kind: cron
        expr: "0 9 * * 1-5"
        tz: Asia/Saigon
      message: "Check Huly for today's tasks and summarize what needs attention"
      agentKey: assistant
      enabled: true

  - kind: CronJob
    name: weekly-data-report
    spec:
      schedule:
        kind: cron
        expr: "0 10 * * 1"
        tz: Asia/Saigon
      message: "Generate weekly data quality and pipeline health report"
      agentKey: report-builder
      enabled: true

  # ============================================================
  # Teams
  # ============================================================
  - kind: AgentTeam
    name: data-team
    spec:
      displayName: "Data Team"
      lead: data-engineer
      members: [data-analyst, report-builder]

  - kind: AgentTeam
    name: product-team
    spec:
      displayName: "Product Team"
      lead: product-planner
      members: [market-researcher, dev-lead]
