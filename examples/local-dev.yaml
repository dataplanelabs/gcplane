apiVersion: gcplane.io/v1
kind: Manifest
metadata:
  name: local-dev
  environment: dev

connection:
  endpoint: http://localhost:18790
  token: ${GOCLAW_TOKEN}

resources:
  # ============================================================
  # LLM Providers
  # ============================================================
  - kind: Provider
    name: zai-coding
    spec:
      displayName: "Z.ai Coding Plan"
      providerType: zai_coding
      apiBase: https://api.z.ai/api/coding/paas/v4
      apiKey: ${GOCLAW_ZAI_CODING_API_KEY}
      enabled: true

  - kind: Provider
    name: openrouter
    spec:
      displayName: "OpenRouter"
      providerType: openrouter
      apiBase: https://openrouter.ai/api/v1
      apiKey: ${GOCLAW_OPENROUTER_API_KEY}
      enabled: true

  - kind: Provider
    name: anthropic
    spec:
      displayName: "Anthropic (Proxy)"
      providerType: openai_compat
      apiBase: ${GOCLAW_ANTHROPIC_BASE_URL}
      apiKey: ${GOCLAW_ANTHROPIC_API_KEY}
      enabled: true

  - kind: Provider
    name: gemini
    spec:
      displayName: "Google Gemini"
      providerType: gemini_native
      apiKey: ${GOCLAW_GEMINI_API_KEY}
      enabled: true

  # ============================================================
  # General Purpose Agent
  # ============================================================
  - kind: Agent
    name: assistant
    spec:
      displayName: "Assistant"
      provider: zai-coding
      model: glm-5
      agentType: open
      status: active
      isDefault: true
      toolsConfig:
        profile: coding

  # ============================================================
  # Data Team — pipeline, analysis, reporting
  # ============================================================
  - kind: Agent
    name: data-engineer
    spec:
      displayName: "Data Engineer"
      provider: zai-coding
      model: glm-5
      agentType: predefined
      status: active
      toolsConfig:
        profile: coding
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a senior data engineer at DataPlane Labs.
            Responsibilities:
            - Build and maintain ETL/ELT pipelines
            - Manage data warehouse schemas and migrations
            - Monitor data quality metrics and alerting
            - Optimize query performance
            Tech stack: PostgreSQL, dbt, Airflow, Python.

  - kind: Agent
    name: data-analyst
    spec:
      displayName: "Data Analyst"
      provider: openrouter
      model: google/gemini-2.5-flash-preview
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a data analyst at DataPlane Labs.
            Responsibilities:
            - Analyze datasets and produce actionable insights
            - Create dashboards and visualizations
            - Run A/B test analysis and statistical modeling
            - Answer ad-hoc data questions from stakeholders
            Tools: SQL, Python (pandas, matplotlib), Metabase.

  - kind: Agent
    name: report-builder
    spec:
      displayName: "Report Builder"
      provider: zai-coding
      model: glm-5
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a report builder at DataPlane Labs.
            Responsibilities:
            - Generate weekly/monthly executive summaries
            - Create data-driven presentations
            - Compile KPI dashboards and trend analysis
            - Format reports for different audiences (C-level, teams, external)
            Output: Markdown reports, PDF exports, slide decks.

  # ============================================================
  # Product Team — research, planning, development
  # ============================================================
  - kind: Agent
    name: market-researcher
    spec:
      displayName: "Market Researcher"
      provider: openrouter
      model: google/gemini-2.5-flash-preview
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a market researcher at DataPlane Labs.
            Responsibilities:
            - Analyze competitor products and positioning
            - Identify market trends and opportunities
            - Conduct user research synthesis
            - Evaluate pricing and go-to-market strategies
            Focus: AI infrastructure, developer tools, cloud-native platforms.

  - kind: Agent
    name: product-planner
    spec:
      displayName: "Product Planner"
      provider: zai-coding
      model: glm-5
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a product planner at DataPlane Labs.
            Responsibilities:
            - Write PRDs and feature specifications
            - Prioritize backlog using RICE/ICE scoring
            - Create product roadmaps and release plans
            - Coordinate between engineering, design, and stakeholders
            Products: GoClaw (AI gateway), GCPlane (GitOps control plane).

  - kind: Agent
    name: dev-lead
    spec:
      displayName: "Dev Lead"
      provider: zai-coding
      model: glm-5
      agentType: predefined
      status: active
      toolsConfig:
        profile: coding
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a dev lead at DataPlane Labs.
            Responsibilities:
            - Review architecture decisions and PRs
            - Mentor engineers and run code reviews
            - Coordinate sprint planning and execution
            - Manage technical debt and system reliability
            Stack: Go, TypeScript, PostgreSQL, Kubernetes, Docker.

  # ============================================================
  # Support & Ops
  # ============================================================
  - kind: Agent
    name: support-bot
    spec:
      displayName: "Support Bot"
      provider: zai-coding
      model: glm-5
      agentType: predefined
      status: active
      toolsConfig:
        profile: minimal
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are the DataPlane Labs support bot.
            Responsibilities:
            - Answer customer questions about GoClaw and GCPlane
            - Troubleshoot deployment and configuration issues
            - Escalate complex issues to the engineering team
            - Maintain FAQ and knowledge base
            Tone: helpful, concise, professional.

  - kind: Agent
    name: devops-engineer
    spec:
      displayName: "DevOps Engineer"
      provider: zai-coding
      model: glm-5
      agentType: predefined
      status: active
      toolsConfig:
        profile: coding
      contextFiles:
        - name: IDENTITY.md
          content: |
            You are a DevOps engineer at DataPlane Labs.
            Responsibilities:
            - Monitor Kubernetes clusters and infrastructure health
            - Manage CI/CD pipelines and deployments
            - Handle incident response and post-mortems
            - Optimize resource usage and costs
            Tools: kubectl, Helm, Terraform, GitHub Actions, Prometheus, Grafana.

  # ============================================================
  # Channels
  # ============================================================
  - kind: Channel
    name: telegram-main
    spec:
      channelType: telegram
      agentKey: assistant
      botToken: ${GOCLAW_TELEGRAM_TOKEN}

  - kind: Channel
    name: slack-main
    spec:
      channelType: slack
      agentKey: assistant
      botToken: ${GOCLAW_SLACK_BOT_TOKEN}
      config:
        appToken: ${GOCLAW_SLACK_APP_TOKEN}

  # ============================================================
  # MCP Servers
  # ============================================================
  - kind: MCPServer
    name: huly-mcp
    spec:
      displayName: "Huly Project Management"
      transport: sse
      url: https://mcp.dataplanelabs.com/huly/mcp
      enabled: true
      grants:
        agents: [assistant, product-planner, dev-lead]

  - kind: MCPServer
    name: k8s-mcp
    spec:
      displayName: "Kubernetes Monitoring"
      transport: sse
      url: https://mcp.dataplanelabs.com/k8s/mcp
      enabled: true
      grants:
        agents: [assistant, devops-engineer, data-engineer]

  - kind: MCPServer
    name: gws-mcp
    spec:
      displayName: "Google Workspace"
      transport: sse
      url: https://mcp.dataplanelabs.com/gws/mcp
      enabled: true
      grants:
        agents: [assistant, report-builder, product-planner]

  # ============================================================
  # Cron Jobs
  # ============================================================
  - kind: CronJob
    name: daily-standup
    spec:
      schedule:
        kind: cron
        expr: "0 9 * * 1-5"
        tz: Asia/Saigon
      message: "Check Huly for today's tasks, summarize blockers and priorities for the team"
      agentKey: product-planner
      enabled: true

  - kind: CronJob
    name: weekly-data-report
    spec:
      schedule:
        kind: cron
        expr: "0 10 * * 1"
        tz: Asia/Saigon
      message: "Generate weekly data quality and pipeline health report. Include error rates, latency trends, and storage growth."
      agentKey: report-builder
      enabled: true

  - kind: CronJob
    name: daily-infra-check
    spec:
      schedule:
        kind: cron
        expr: "0 8 * * *"
        tz: Asia/Saigon
      message: "Check k8s cluster health: pod restarts, resource usage, pending alerts. Report issues."
      agentKey: devops-engineer
      enabled: true

  # ============================================================
  # Agent Teams
  # ============================================================
  - kind: AgentTeam
    name: data-team
    spec:
      displayName: "Data Team"
      lead: data-engineer
      members: [data-analyst, report-builder]
      settings:
        version: v2
        notifications:
          taskDispatched: true
          taskProgress: true
          taskFailed: true
        deliveryMode: direct

  - kind: AgentTeam
    name: product-team
    spec:
      displayName: "Product Team"
      lead: product-planner
      members: [market-researcher, dev-lead]
      settings:
        version: v2
        notifications:
          taskDispatched: true
          taskProgress: true
          taskFailed: true
        deliveryMode: through_leader

  - kind: AgentTeam
    name: ops-team
    spec:
      displayName: "Ops Team"
      lead: devops-engineer
      members: [support-bot]
      settings:
        version: v2
        notifications:
          taskDispatched: true
          taskProgress: false
          taskFailed: true
        deliveryMode: direct
