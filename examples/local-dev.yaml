apiVersion: gcplane.io/v1
kind: Manifest
metadata:
  name: local-dev
  environment: dev

connection:
  endpoint: http://localhost:18790
  token: ${GOCLAW_TOKEN}

resources:
  # --- LLM Provider ---
  - kind: Provider
    key: zai-coding
    spec:
      displayName: "Z.ai Coding Plan"
      providerType: zai_coding
      apiBase: https://api.z.ai/api/coding/paas/v4
      apiKey: ${GOCLAW_ZAI_CODING_API_KEY}
      enabled: true

  # --- Agent ---
  - kind: Agent
    key: assistant
    spec:
      displayName: "Assistant"
      provider: zai-coding
      model: glm-5
      agentType: open
      status: active
      isDefault: true
      toolsConfig:
        profile: coding
