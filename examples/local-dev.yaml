apiVersion: gcplane.io/v1
kind: Manifest
metadata:
  name: local-dev
  environment: dev

connection:
  endpoint: http://localhost:18790
  token: ${GOCLAW_TOKEN}

resources:
  # ============================================================
  # LLM Providers
  # ============================================================
  - kind: Provider
    name: zai-coding
    spec:
      displayName: "Z.ai Coding Plan"
      providerType: zai_coding
      apiBase: https://api.z.ai/api/coding/paas/v4
      apiKey: ${GOCLAW_ZAI_CODING_API_KEY}
      enabled: true

  - kind: Provider
    name: openrouter
    spec:
      displayName: "OpenRouter"
      providerType: openrouter
      apiBase: https://openrouter.ai/api/v1
      apiKey: ${GOCLAW_OPENROUTER_API_KEY}
      enabled: true

  - kind: Provider
    name: anthropic
    spec:
      displayName: "Anthropic (Proxy)"
      providerType: openai_compat
      apiBase: ${GOCLAW_ANTHROPIC_BASE_URL}
      apiKey: ${GOCLAW_ANTHROPIC_API_KEY}
      enabled: true

  - kind: Provider
    name: gemini
    spec:
      displayName: "Google Gemini"
      providerType: gemini_native
      apiKey: ${GOCLAW_GEMINI_API_KEY}
      enabled: true

  # ============================================================
  # Agents
  # ============================================================
  - kind: Agent
    name: assistant
    spec:
      displayName: "Assistant"
      provider: zai-coding
      model: glm-5
      agentType: open
      status: active
      isDefault: true
      toolsConfig:
        profile: coding

  - kind: Agent
    name: researcher
    spec:
      displayName: "Researcher"
      provider: openrouter
      model: google/gemini-2.5-flash-preview
      agentType: open
      status: active
      toolsConfig:
        profile: minimal

  # ============================================================
  # Channels
  # ============================================================
  - kind: Channel
    name: telegram-main
    spec:
      channelType: telegram
      agentKey: assistant
      botToken: ${GOCLAW_TELEGRAM_TOKEN}

  - kind: Channel
    name: slack-main
    spec:
      channelType: slack
      agentKey: assistant
      botToken: ${GOCLAW_SLACK_BOT_TOKEN}
      config:
        appToken: ${GOCLAW_SLACK_APP_TOKEN}

  # ============================================================
  # MCP Servers (from infra/prod deployment)
  # ============================================================
  - kind: MCPServer
    name: huly-mcp
    spec:
      displayName: "Huly Project Management"
      transport: sse
      url: https://mcp.dataplanelabs.com/huly/sse
      enabled: true
      grants:
        agents: [assistant, researcher]

  - kind: MCPServer
    name: k8s-mcp
    spec:
      displayName: "Kubernetes Monitoring"
      transport: sse
      url: https://mcp.dataplanelabs.com/k8s/sse
      enabled: true
      grants:
        agents: [assistant]

  - kind: MCPServer
    name: gws-mcp
    spec:
      displayName: "Google Workspace"
      transport: sse
      url: https://mcp.dataplanelabs.com/gws/sse
      enabled: true
      grants:
        agents: [assistant]

  # ============================================================
  # Cron Jobs
  # ============================================================
  - kind: CronJob
    name: daily-standup
    spec:
      schedule:
        kind: cron
        expr: "0 9 * * 1-5"
        tz: Asia/Saigon
      message: "Check Huly for today's tasks and summarize what needs attention"
      agentKey: assistant
      enabled: true

  # ============================================================
  # Teams
  # ============================================================
  - kind: Team
    name: dev-team
    spec:
      displayName: "Dev Team"
      lead: assistant
      members: [researcher]

  # TTS Config — skipped (tts.get WS method not available in all versions)
  # - kind: TTSConfig
  #   name: global
  #   spec:
  #     mode: "off"
  #     provider: edge
  #     voice: en-US-AriaNeural
